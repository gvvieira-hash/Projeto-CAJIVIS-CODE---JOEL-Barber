<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Barbearia</title>

    <link rel="stylesheet" href="style.css">

    <!-- ICONS -->
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
</head>
<body>

    <section class="login-page">

        <!-- OVERLAY -->
        <div class="overlay"></div>

        <!-- CARD -->
        <div class="login-card">

            <!-- LOGO -->
            <img src="Logotipo_barbearia_profissional_cinza_e_vermelho-removebg-preview.png" class="logo" alt="Logo">

            <!-- TÍTULO -->
            <h1>Bem vindo de volta</h1>

            <p>
                Faça login para acessar e gerenciar seus agendamentos
            </p>

            <!-- FORM -->
            <form>

                <!-- EMAIL -->
                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" placeholder="E-mail"required>
                </div>

                <!-- SENHA -->
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="senha" placeholder="Senha"required>
                    <i class="fa-regular fa-eye-slash"></i>
                </div>

                <!-- BOTÃO -->
               <a href="https://gvvieira-hash.github.io/Projeto-CAJIVIS-CODE---JOEL-Barber/home/home.html" class="btn-entrar disabled" id="btnEntrar">Entrar</a>

            <!-- CADASTRO -->
            <div class="register">

                <span>
                    Não tem uma conta?
                </span>

               <a href="../criar conta/index2.html">Criar conta</a>

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
